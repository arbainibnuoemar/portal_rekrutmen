<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap');
  .exam-page {
    min-height: 520px;
    background: #f4f7fb;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'DM Sans', sans-serif;
    border-radius: var(--border-radius-lg);
  }
  .exam-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(37,99,235,0.08), 0 1px 4px rgba(0,0,0,0.06);
    padding: 2.5rem 2rem;
    max-width: 460px;
    width: 100%;
    text-align: center;
  }
  .success-icon-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #dcfce7;
    margin: 0 auto 1.5rem;
  }
  .exam-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 0.75rem;
    line-height: 1.2;
  }
  .exam-desc {
    font-size: 15px;
    color: #4b5563;
    line-height: 1.65;
    margin: 0 0 1.5rem;
  }
  .exam-notice {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.75rem;
    text-align: left;
  }
  .exam-notice-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #2563eb;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .exam-notice p {
    font-size: 14px;
    color: #1e40af;
    line-height: 1.6;
    margin: 0;
  }
  .exam-cta {
    display: block;
    width: 100%;
    background: #2563eb;
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border-radius: 12px;
    padding: 0.875rem 1rem;
    text-decoration: none;
    box-sizing: border-box;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .exam-cta:hover { background: #1d4ed8; }
  .exam-cta-icon {
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
    width: 18px;
    height: 18px;
  }
</style>

<div class="exam-page">
  <div class="exam-card">

    <div class="success-icon-wrap">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="8 12 11 15 16 9"/>
      </svg>
    </div>

    <h1 class="exam-title">Terima Kasih!</h1>

    <p class="exam-desc">
      Pelaksanaan tahapan Tes Tertulis Rekrutmen Outsourcing Kanwil Kemenhaj Provinsi Kalimantan Utara TA 2026 telah selesai.
    </p>

    <div class="exam-notice">
      <span class="exam-notice-label">Informasi Penting</span>
      <p>Untuk pembaruan informasi kelulusan dan tahapan selanjutnya, harap pantau terus media sosial resmi kami.</p>
    </div>

    <a href="https://instagram.com/kemenhaj.kaltara" target="_blank" rel="noopener noreferrer" class="exam-cta">
      <svg class="exam-cta-icon" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/>
      </svg>
      Update Info di IG @kemenhaj.kaltara
    </a>

  </div>
</div>
